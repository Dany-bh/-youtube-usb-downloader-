name: Build Android APK & AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configurar Java JDK (Requerido para compilar Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Instalar Flet y dependencias en el host de compilación
      - name: Install Flet & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet yt-dlp

      # 5. Compilar el APK (Instalador directo en celulares)
      - name: Build Android APK
        run: |
          python -m flet.cli build apk --project YouTubeDownloader --verbose

      # 6. Compilar el AAB (Para subir a Play Store)
      - name: Build Android App Bundle (AAB)
        run: |
          python -m flet.cli build aab --project YouTubeDownloader --verbose

      # 7. Subir el archivo APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-APK
          path: build/apk/*.apk

      # 8. Subir el archivo AAB
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-AAB
          path: build/aab/*.aab

