<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="#0F172A" />
  <rect width="480" height="480" x="16" y="16" rx="112" fill="none" stroke="url(#grad1)" stroke-width="8" opacity="0.5" />
  
  <!-- Glowing Graphic Group -->
  <g filter="url(#glow)">
    <!-- USB / Download Arrow -->
    <path d="M256 360 L180 270 L230 270 L230 140 L282 140 L282 270 L332 270 Z" fill="url(#grad1)" />
    <!-- Music Note Outline merged with target -->
    <circle cx="210" cy="380" r="30" fill="url(#grad1)" />
    <path d="M240 380 L240 220 L320 190 L320 250 L240 280" fill="none" stroke="url(#grad1)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="290" cy="250" r="25" fill="url(#grad1)" />
  </g>
</svg>
